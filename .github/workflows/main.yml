{name: MyContentAuto Bot

on:
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Libraries
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Reconstruct Credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Execute Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
        run: python generate_plan.py}
